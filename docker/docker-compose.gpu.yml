# Overlay file for the Isaac ROS GPU variant of the FORTIS dev container.
#
# This file is intended to be composed on top of docker/docker-compose.yml:
#
#   docker compose -f docker/docker-compose.yml \
#                  -f docker/docker-compose.gpu.yml up
#
# It defines a new service `fortis-dev-gpu` that shares the volume mounts and
# ROS environment of the existing `dev` service but uses the GPU Dockerfile
# and reserves an NVIDIA GPU at runtime. See docker/README.md and
# docs/adr/0001-dual-container-strategy.md.

services:
  fortis-dev-gpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev-gpu
    image: fortis-dev-gpu:latest
    container_name: fortis-dev-gpu
    network_mode: host
    ipc: host
    privileged: true
    volumes:
      - ..:/workspace:cached
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=42
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
    # Modern GPU reservation via the compose v3+ device API. Requires the
    # NVIDIA Container Toolkit on the host (`nvidia-ctk runtime configure`).
    # On older docker-compose installs that don't honor this, fall back to
    # `runtime: nvidia` by editing this file locally - we do not set it here
    # because mixing both forms emits a warning.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
    command: /bin/bash
