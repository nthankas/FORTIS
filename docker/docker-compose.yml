services:
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: fortis-dev:latest
    container_name: fortis-dev
    network_mode: host
    ipc: host
    privileged: true
    volumes:
      - ..:/workspace:cached
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=42
    stdin_open: true
    tty: true
    command: /bin/bash