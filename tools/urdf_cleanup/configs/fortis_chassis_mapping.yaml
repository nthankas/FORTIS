# Default FORTIS chassis mapping for urdf_cleanup.
#
# Maps the mangled link / joint names the May 10 OnShape export
# produces to the clean names defined in CLAUDE.md's "Frame naming
# conventions" section. Refresh this file whenever Adrian + Carlos
# re-export the URDF -- the mangled-name suffixes change with every
# OnShape re-version of the assembly.
#
# Schema:
#   chassis_link:  one literal string (the name TopologyFixer should
#                  reparent hanging wheel hubs onto). Defaults to
#                  base_link.
#   link_mapping:  mangled-name -> clean-name pairs.
#   joint_mapping: mangled-name -> clean-name pairs.
#
# Names absent from these tables are left untouched and reported as
# unmapped at --verbose time -- a clean failure is better than a
# silent rename of something load-bearing.

chassis_link: base_link

link_mapping:
  base_link__1__: base_link
  wheel_hub_fl__1__: front_left_wheel_link
  wheel_hub_fr__1__: front_right_wheel_link
  wheel_hub_bl__1__: rear_left_wheel_link
  wheel_hub_br__1__: rear_right_wheel_link

joint_mapping:
  hanging_node_to_root_joint_1: front_left_wheel_joint
  hanging_node_to_root_joint_2: front_right_wheel_joint
  hanging_node_to_root_joint_3: rear_left_wheel_joint
  hanging_node_to_root_joint_4: rear_right_wheel_joint
